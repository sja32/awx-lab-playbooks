- name: STIG Baseline Hardening - Ubuntu
  hosts: all
  become: yes

  tasks:

    - name: Ensure system is up to date
      apt:
        update_cache: yes
        upgrade: dist

    - name: Ensure UFW firewall is installed
      apt:
        name: ufw
        state: present

    - name: Allow SSH
      ufw:
        rule: allow
        name: OpenSSH

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Disable root SSH login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'

    - name: Disable password authentication (STIG style)
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PasswordAuthentication'
        line: 'PasswordAuthentication no'

    - name: Restart SSH service
      service:
        name: ssh
        state: restarted

    - name: Ensure auditd is installed
      apt:
        name: auditd
        state: present

    - name: Ensure auditd is running
      service:
        name: auditd
        state: started
        enabled: yes

    - name: Check for world-writable files
      command: find / -xdev -type f -perm -0002
      register: ww_files
      ignore_errors: yes

    - name: Show world-writable files
      debug:
        var: ww_files.stdout_lines
